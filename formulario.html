<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIP - Banco Provincia</title>
  <link rel="icon" href="https://ext.same-assets.com/1996896656/4121383702.ico">
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/formulario.css">
</head>
<body>

  <a href="inicio.html" class="back-link">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Volver al inicio
  </a>

  <div class="login-container">
    <div class="login-header">
      <img src="https://ext.same-assets.com/1996896656/3529171109.svg" alt="Banco Provincia">
    </div>

    <div class="login-body">
      <h1 class="login-title">Inicia sesion</h1>

      <div class="login-alert" id="loginAlert"></div>

      <form id="loginForm" action="http://localhost/Banco%20Provincia/login.php" method="post">
        <div class="form-group">
          <label class="form-label">
            Nombre de usuario <span class="required">*</span>
          </label>
          <input
            type="text"
            name="usuario"
            class="form-input"
            placeholder="Ingresá tu nombre de usuario"
            autocomplete="off"
            maxlength="25"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">
            Clave <span class="required">*</span>
          </label>
          <div class="password-container">
            <input
              type="password"
              name="clave"
              class="form-input"
              id="password"
              placeholder="Ingresá tu clave"
              autocomplete="off"
              maxlength="30"
              required
            >
            <button type="button" class="password-toggle" onclick="togglePassword()" aria-label="Mostrar clave">
              <svg viewBox="0 0 24 24" id="eyeIcon">
                <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="button" class="virtual-keyboard">
          Teclado Virtual
          <svg viewBox="0 0 24 24">
            <path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/>
          </svg>
        </button>

        <button type="submit" class="btn-login">Ingresar</button>
      </form>

      <div class="register-access">
        <span>¿No tenés cuenta?</span>
        <a href="registro.html" class="register-button">Crear cuenta</a>
      </div>

      <div class="help-links">
        <button type="button" class="help-link">Bloquee u olvide mi usuario y/o clave</button>
        <button type="button" class="help-link">Conoce como hacerte usuario u operar</button>
        <button type="button" class="help-link">Recomendaciones de seguridad</button>
      </div>
    </div>
  </div>
  <script src='js/formulario.js'></script>

</body>
</html>
